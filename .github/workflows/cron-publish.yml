name: Posts veröffentlichen

on:
  schedule:
    - cron: '*/5 * * * *'  # Alle 5 Minuten
  workflow_dispatch:        # Manuell auslösbar

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Geplante Posts veröffentlichen
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://planer.benselmedia.de/api/cron/publish
